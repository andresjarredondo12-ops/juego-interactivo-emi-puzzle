<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>EMI PUZZLE FLOW CAM MOBILE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,Helvetica,sans-serif;
touch-action:none;
}

body{
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#222,#000);
}

canvas{
position:absolute;
inset:0;
width:100%;
height:100%;
touch-action:none;
}

#ui{
position:absolute;
top:10px;
left:10px;
right:10px;
z-index:100;
display:flex;
flex-direction:column;
gap:10px;
}

.row{
display:flex;
gap:10px;
}

.panel{
flex:1;
background:rgba(255,255,255,.1);
backdrop-filter:blur(10px);
padding:12px;
border-radius:16px;
color:white;
font-weight:bold;
text-align:center;
}

button{
flex:1;
border:none;
border-radius:16px;
padding:14px;
background:#ff0055;
color:white;
font-size:16px;
font-weight:bold;
}

button:active{
transform:scale(.95);
}

#cameraBtn.active{
background:#00bb66;
}

#video{
position:absolute;
right:10px;
bottom:10px;
width:110px;
height:150px;
object-fit:cover;
border-radius:20px;
border:2px solid white;
z-index:50;
background:black;
display:none;
}

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:34px;
font-weight:bold;
z-index:300;
display:none;
text-shadow:0 0 20px black;
}

</style>
</head>
<body>

<div id="ui">

<div class="row">
<div class="panel" id="levelText">Nivel 1</div>
<div class="panel" id="movesText">Movimientos 0</div>
</div>

<div class="row">
<button id="cameraBtn">Cámara OFF</button>
<button id="restartBtn">Reiniciar</button>
</div>

</div>

<video id="video" autoplay playsinline muted></video>

<div id="message"></div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const levelText = document.getElementById("levelText");
const movesText = document.getElementById("movesText");
const message = document.getElementById("message");

const video = document.getElementById("video");
const cameraBtn = document.getElementById("cameraBtn");

let width;
let height;
let dpr;

function resize(){

dpr = window.devicePixelRatio || 1;

width = innerWidth;
height = innerHeight;

canvas.width = width * dpr;
canvas.height = height * dpr;

canvas.style.width = width+"px";
canvas.style.height = height+"px";

ctx.setTransform(dpr,0,0,dpr,0,0);

board.x = width/2;
board.y = height/2 + 30;
board.radius = Math.min(width,height)*0.35;

draw();

}

const COLORS = [
"#ff3355",
"#00cc66",
"#3399ff",
"#ffaa00",
"#cc33ff",
"#00ffee",
"#ff6699"
];

let board = {
x:0,
y:0,
radius:0
};

let currentLevel = 1;

let nodes = [];
let paths = [];

let drawing = false;
let activeColor = null;
let currentPath = [];

let moves = 0;

function distance(a,b){

return Math.hypot(
a.x-b.x,
a.y-b.y
);

}

function randomPoint(){

const angle = Math.random()*Math.PI*2;
const radius = Math.random()*(board.radius-60);

return{
x:board.x + Math.cos(angle)*radius,
y:board.y + Math.sin(angle)*radius
};

}

function generateLevel(){

nodes = [];
paths = [];
currentPath = [];

const pairs = Math.min(3+currentLevel,7);

for(let i=0;i<pairs;i++){

let p1,p2;

do{
p1 = randomPoint();
}
while(nodes.some(n=>distance(n,p1)<90));

do{
p2 = randomPoint();
}
while(nodes.some(n=>distance(n,p2)<90));

nodes.push({
x:p1.x,
y:p1.y,
color:COLORS[i]
});

nodes.push({
x:p2.x,
y:p2.y,
color:COLORS[i]
});

}

draw();

}

function drawBoard(){

ctx.beginPath();

ctx.arc(
board.x,
board.y,
board.radius,
0,
Math.PI*2
);

ctx.fillStyle="#fafafa";
ctx.fill();

ctx.lineWidth=6;
ctx.strokeStyle="#111";
ctx.stroke();

}

function drawNodes(){

for(const n of nodes){

ctx.beginPath();

ctx.arc(n.x,n.y,18,0,Math.PI*2);

ctx.fillStyle=n.color;

ctx.shadowBlur=20;
ctx.shadowColor=n.color;

ctx.fill();

ctx.shadowBlur=0;

ctx.lineWidth=3;
ctx.strokeStyle="#000";
ctx.stroke();

}

}

function drawPath(points,color){

if(points.length<2) return;

ctx.beginPath();

ctx.moveTo(points[0].x,points[0].y);

for(let i=1;i<points.length;i++){

ctx.lineTo(points[i].x,points[i].y);

}

ctx.lineWidth=10;
ctx.lineCap="round";
ctx.lineJoin="round";

ctx.strokeStyle=color;

ctx.stroke();

}

function draw(){

ctx.clearRect(0,0,width,height);

drawBoard();

for(const p of paths){

drawPath(p.points,p.color);

}

if(currentPath.length){

drawPath(currentPath,activeColor);

}

drawNodes();

}

function getNode(pos){

for(const n of nodes){

if(distance(pos,n)<28){

return n;

}

}

return null;

}

function insideBoard(pos){

return distance(pos,{
x:board.x,
y:board.y
}) <= board.radius;

}

function startLine(pos){

const node = getNode(pos);

if(!node) return;

drawing = true;

activeColor = node.color;

currentPath = [{
x:node.x,
y:node.y
}];

paths = paths.filter(
p=>p.color!==activeColor
);

draw();

}

function moveLine(pos){

if(!drawing) return;

if(!insideBoard(pos)) return;

const last =
currentPath[currentPath.length-1];

if(distance(last,pos)<5) return;

currentPath.push({
x:pos.x,
y:pos.y
});

draw();

}

function checkVictory(){

const colors = [
...new Set(nodes.map(n=>n.color))
];

return paths.length === colors.length;

}

function nextLevel(){

message.style.display="block";
message.innerHTML="NIVEL COMPLETADO";

setTimeout(()=>{

message.style.display="none";

currentLevel++;

levelText.innerHTML =
"Nivel " + currentLevel;

generateLevel();

},1500);

}

function endLine(pos){

if(!drawing) return;

drawing = false;

const node = getNode(pos);

if(node && node.color===activeColor){

currentPath.push({
x:node.x,
y:node.y
});

paths.push({
color:activeColor,
points:[...currentPath]
});

moves++;

movesText.innerHTML =
"Movimientos " + moves;

if(checkVictory()){

nextLevel();

}

}

currentPath=[];

draw();

}

function getTouchPos(e){

const rect =
canvas.getBoundingClientRect();

const touch =
e.touches[0] || e.changedTouches[0];

return{
x:touch.clientX - rect.left,
y:touch.clientY - rect.top
};

}

/* TOUCH MOBILE */

canvas.addEventListener("touchstart",e=>{

e.preventDefault();

startLine(
getTouchPos(e)
);

},{passive:false});

canvas.addEventListener("touchmove",e=>{

e.preventDefault();

moveLine(
getTouchPos(e)
);

},{passive:false});

canvas.addEventListener("touchend",e=>{

e.preventDefault();

endLine(
getTouchPos(e)
);

},{passive:false});

/* MOUSE DESKTOP */

let mouseDown = false;

canvas.addEventListener("mousedown",e=>{

mouseDown=true;

startLine({
x:e.clientX,
y:e.clientY
});

});

canvas.addEventListener("mousemove",e=>{

if(!mouseDown) return;

moveLine({
x:e.clientX,
y:e.clientY
});

});

canvas.addEventListener("mouseup",e=>{

mouseDown=false;

endLine({
x:e.clientX,
y:e.clientY
});

});

/* CAMERA SIMPLE */

let stream = null;

cameraBtn.onclick = async()=>{

if(stream){

stream.getTracks().forEach(
t=>t.stop()
);

stream = null;

video.style.display="none";

cameraBtn.innerHTML="Cámara OFF";
cameraBtn.classList.remove("active");

return;

}

try{

stream =
await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user"
},
audio:false
});

video.srcObject = stream;

video.style.display="block";

cameraBtn.innerHTML="Cámara ON";
cameraBtn.classList.add("active");

}catch(err){

alert(
"No se pudo abrir la cámara.\n\nUsa HTTPS o Chrome móvil."
);

}

};

document.getElementById("restartBtn")
.onclick=()=>{

moves=0;

movesText.innerHTML=
"Movimientos 0";

generateLevel();

};

window.addEventListener(
"resize",
resize
);

resize();

generateLevel();

</script>

</body>
</html>
