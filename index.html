```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>EMI PUZZLE FLOW CAM</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,Helvetica,sans-serif;
touch-action:none;
}

body{
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#222,#000);
}

canvas{
position:absolute;
inset:0;
width:100%;
height:100%;
}

#ui{
position:absolute;
top:10px;
left:10px;
right:10px;
z-index:100;
display:flex;
flex-direction:column;
gap:10px;
}

.row{
display:flex;
gap:10px;
}

.panel{
flex:1;
background:rgba(255,255,255,.1);
backdrop-filter:blur(10px);
padding:12px;
border-radius:16px;
color:white;
text-align:center;
font-weight:bold;
font-size:16px;
}

button{
flex:1;
border:none;
border-radius:16px;
padding:14px;
background:#ff0055;
color:white;
font-size:16px;
font-weight:bold;
}

button:active{
transform:scale(.96);
}

#modeBtn.cam{
background:#00bb66;
}

#video{
position:absolute;
right:10px;
bottom:10px;
width:120px;
height:160px;
border-radius:20px;
object-fit:cover;
border:2px solid white;
z-index:50;
background:#000;
}

#cursor{
position:absolute;
width:28px;
height:28px;
border-radius:50%;
background:#00ff99;
border:3px solid white;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:200;
display:none;
box-shadow:0 0 25px #00ff99;
}

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:42px;
font-weight:bold;
z-index:300;
text-shadow:0 0 20px black;
display:none;
}

</style>
</head>
<body>

<div id="ui">

<div class="row">
<div class="panel" id="levelText">Nivel 1</div>
<div class="panel" id="movesText">Movimientos 0</div>
</div>

<div class="row">
<button id="modeBtn">Modo Cámara OFF</button>
<button id="restartBtn">Reiniciar</button>
</div>

</div>

<video id="video" autoplay playsinline muted></video>

<div id="cursor"></div>

<div id="message"></div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const cursor = document.getElementById("cursor");
const message = document.getElementById("message");

const levelText = document.getElementById("levelText");
const movesText = document.getElementById("movesText");

const video = document.getElementById("video");

let width,height,dpr;

function resize(){

dpr = window.devicePixelRatio || 1;

width = innerWidth;
height = innerHeight;

canvas.width = width * dpr;
canvas.height = height * dpr;

canvas.style.width = width+"px";
canvas.style.height = height+"px";

ctx.setTransform(dpr,0,0,dpr,0,0);

board.x = width/2;
board.y = height/2 + 40;
board.radius = Math.min(width,height)*0.35;

draw();
}

const COLORS = [
"#ff3355",
"#00cc66",
"#3399ff",
"#ffaa00",
"#cc33ff",
"#00ffee",
"#ff66cc"
];

let board = {
x:0,
y:0,
radius:0
};

let currentLevel = 1;

let nodes = [];
let paths = [];

let drawing = false;
let activeColor = null;
let currentPath = [];

let moves = 0;

let cameraMode = false;

function vibrate(ms=20){
if(navigator.vibrate){
navigator.vibrate(ms);
}
}

function distance(a,b){
return Math.hypot(a.x-b.x,a.y-b.y);
}

function randomPoint(){

const angle = Math.random()*Math.PI*2;
const radius = Math.random()*(board.radius-60);

return {
x:board.x + Math.cos(angle)*radius,
y:board.y + Math.sin(angle)*radius
};

}

function generateLevel(){

nodes = [];
paths = [];
currentPath = [];

const pairs = Math.min(3 + currentLevel,7);

for(let i=0;i<pairs;i++){

let p1,p2;

do{
p1 = randomPoint();
}while(nodes.some(n=>distance(n,p1)<100));

do{
p2 = randomPoint();
}while(nodes.some(n=>distance(n,p2)<100));

nodes.push({
x:p1.x,
y:p1.y,
color:COLORS[i]
});

nodes.push({
x:p2.x,
y:p2.y,
color:COLORS[i]
});

}

draw();

}

function drawBoard(){

ctx.beginPath();
ctx.arc(board.x,board.y,board.radius,0,Math.PI*2);

ctx.fillStyle="#fafafa";
ctx.fill();

ctx.lineWidth=6;
ctx.strokeStyle="#111";
ctx.stroke();

}

function drawNodes(){

for(const n of nodes){

ctx.beginPath();
ctx.arc(n.x,n.y,18,0,Math.PI*2);

ctx.fillStyle=n.color;

ctx.shadowBlur=20;
ctx.shadowColor=n.color;

ctx.fill();

ctx.shadowBlur=0;

ctx.lineWidth=3;
ctx.strokeStyle="#000";
ctx.stroke();

}

}

function drawPath(points,color){

if(points.length < 2) return;

ctx.beginPath();

ctx.moveTo(points[0].x,points[0].y);

for(let i=1;i<points.length;i++){

ctx.lineTo(points[i].x,points[i].y);

}

ctx.lineWidth=10;
ctx.lineCap="round";
ctx.lineJoin="round";
ctx.strokeStyle=color;

ctx.stroke();

}

function draw(){

ctx.clearRect(0,0,width,height);

drawBoard();

for(const p of paths){

drawPath(p.points,p.color);

}

if(currentPath.length){

drawPath(currentPath,activeColor);

}

drawNodes();

}

function getNode(pos){

for(const n of nodes){

if(distance(pos,n)<28){

return n;

}

}

return null;

}

function insideBoard(pos){

return distance(pos,{
x:board.x,
y:board.y
}) <= board.radius;

}

function startLine(pos){

const node = getNode(pos);

if(!node) return;

drawing = true;

activeColor = node.color;

currentPath = [{
x:node.x,
y:node.y
}];

paths = paths.filter(p=>p.color!==activeColor);

vibrate();

draw();

}

function moveLine(pos){

if(!drawing) return;

if(!insideBoard(pos)) return;

const last = currentPath[currentPath.length-1];

if(distance(last,pos)<5) return;

currentPath.push({
x:pos.x,
y:pos.y
});

draw();

}

function checkVictory(){

const colors = [...new Set(nodes.map(n=>n.color))];

if(paths.length !== colors.length) return false;

return true;

}

function nextLevel(){

message.style.display="block";
message.innerHTML="NIVEL COMPLETADO";

setTimeout(()=>{

message.style.display="none";

currentLevel++;

levelText.innerHTML = "Nivel " + currentLevel;

generateLevel();

},1800);

}

function endLine(pos){

if(!drawing) return;

drawing = false;

const node = getNode(pos);

if(node && node.color === activeColor){

currentPath.push({
x:node.x,
y:node.y
});

paths.push({
color:activeColor,
points:[...currentPath]
});

moves++;

movesText.innerHTML = "Movimientos " + moves;

vibrate(40);

if(checkVictory()){

nextLevel();

}

}

currentPath=[];

draw();

}

function pointerPos(e){

if(e.touches){

return {
x:e.touches[0].clientX,
y:e.touches[0].clientY
};

}

return {
x:e.clientX,
y:e.clientY
};

}

canvas.addEventListener("pointerdown",e=>{

if(cameraMode) return;

startLine(pointerPos(e));

});

canvas.addEventListener("pointermove",e=>{

if(cameraMode) return;

moveLine(pointerPos(e));

});

canvas.addEventListener("pointerup",e=>{

if(cameraMode) return;

endLine(pointerPos(e));

});

canvas.addEventListener("pointercancel",e=>{

if(cameraMode) return;

endLine(pointerPos(e));

});

/* CAMERA */

let hands = null;
let camera = null;

let pinch = false;

async function initHands(){

hands = new Hands({

locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
}

});

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(results=>{

if(!cameraMode) return;

if(results.multiHandLandmarks.length){

const hand = results.multiHandLandmarks[0];

const indexTip = hand[8];
const thumbTip = hand[4];

const x = (1-indexTip.x) * width;
const y = indexTip.y * height;

cursor.style.display="block";
cursor.style.left = x+"px";
cursor.style.top = y+"px";

const d = Math.hypot(
thumbTip.x-indexTip.x,
thumbTip.y-indexTip.y
);

if(d < 0.05){

if(!pinch){

pinch = true;

startLine({x,y});

}

moveLine({x,y});

}else{

if(pinch){

endLine({x,y});

}

pinch = false;

}

}else{

cursor.style.display="none";

if(pinch){

endLine({
x:width/2,
y:height/2
});

}

pinch = false;

}

});

}

async function startCamera(){

await initHands();

const stream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user"
},
audio:false
});

video.srcObject = stream;

camera = new Camera(video,{

onFrame:async()=>{

if(hands){

await hands.send({
image:video
});

}

},

width:640,
height:480

});

camera.start();

}

function stopCamera(){

if(video.srcObject){

video.srcObject.getTracks().forEach(track=>track.stop());

}

cursor.style.display="none";

}

document.getElementById("modeBtn").onclick = async function(){

cameraMode = !cameraMode;

if(cameraMode){

this.innerHTML = "Modo Cámara ON";

this.classList.add("cam");

try{

await startCamera();

}catch(err){

alert("No se pudo abrir la cámara");

cameraMode = false;

}

}else{

this.innerHTML = "Modo Cámara OFF";

this.classList.remove("cam");

stopCamera();

}

};

document.getElementById("restartBtn").onclick = ()=>{

moves = 0;

movesText.innerHTML = "Movimientos 0";

generateLevel();

};

window.addEventListener("resize",resize);

resize();

generateLevel();

</script>

</body>
</html>
