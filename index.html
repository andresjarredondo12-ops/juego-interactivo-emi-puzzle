<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<title>EMI FLOW IOS</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
-webkit-user-select:none;
user-select:none;
touch-action:none;
}

body{
position:relative;
background:
linear-gradient(to bottom,#222,#000);
}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:block;
touch-action:none;
}

#ui{
position:absolute;
top:env(safe-area-inset-top,10px);
left:10px;
right:10px;
z-index:10;
}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

.panel{
flex:1;
background:rgba(255,255,255,.15);
color:#fff;
padding:12px;
border-radius:14px;
text-align:center;
font-weight:bold;
font-size:15px;
}

button{
flex:1;
border:none;
padding:14px;
border-radius:14px;
font-size:16px;
font-weight:bold;
background:#ff0066;
color:white;
}

button:active{
opacity:.7;
}

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:34px;
font-weight:bold;
color:white;
display:none;
z-index:20;
text-shadow:0 0 20px black;
}

</style>
</head>
<body>

<div id="ui">

<div class="row">
<div class="panel" id="levelText">Nivel 1</div>
<div class="panel" id="movesText">Movimientos 0</div>
</div>

<div class="row">
<button id="restartBtn">Reiniciar</button>
</div>

</div>

<div id="message"></div>

<canvas id="game"></canvas>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

const levelText =
document.getElementById("levelText");

const movesText =
document.getElementById("movesText");

const message =
document.getElementById("message");

let W,H;

function resize(){

W = window.innerWidth;
H = window.innerHeight;

canvas.width = W;
canvas.height = H;

board.x = W/2;
board.y = H/2 + 30;

board.radius =
Math.min(W,H)*0.35;

draw();

}

window.addEventListener(
"resize",
resize
);

const COLORS = [
"#ff3355",
"#00cc66",
"#3399ff",
"#ffaa00",
"#cc33ff",
"#00ffee"
];

let level = 1;
let moves = 0;

let board = {
x:0,
y:0,
radius:0
};

let nodes = [];
let paths = [];

let drawing = false;
let activeColor = null;
let currentPath = [];

function random(min,max){

return Math.random()*(max-min)+min;

}

function distance(a,b){

const dx = a.x-b.x;
const dy = a.y-b.y;

return Math.sqrt(dx*dx+dy*dy);

}

function randomPoint(){

const angle =
Math.random()*Math.PI*2;

const r =
Math.random()*(board.radius-50);

return{
x:board.x + Math.cos(angle)*r,
y:board.y + Math.sin(angle)*r
};

}

function generateLevel(){

nodes = [];
paths = [];
currentPath = [];

const pairs =
Math.min(level+2,6);

for(let i=0;i<pairs;i++){

let p1,p2;

do{
p1 = randomPoint();
}
while(
nodes.some(
n=>distance(n,p1)<90
)
);

do{
p2 = randomPoint();
}
while(
nodes.some(
n=>distance(n,p2)<90
)
);

nodes.push({
x:p1.x,
y:p1.y,
color:COLORS[i]
});

nodes.push({
x:p2.x,
y:p2.y,
color:COLORS[i]
});

}

draw();

}

function drawBoard(){

ctx.beginPath();

ctx.arc(
board.x,
board.y,
board.radius,
0,
Math.PI*2
);

ctx.fillStyle="#f2f2f2";
ctx.fill();

ctx.lineWidth=5;
ctx.strokeStyle="#111";
ctx.stroke();

}

function drawNodes(){

for(let n of nodes){

ctx.beginPath();

ctx.arc(
n.x,
n.y,
18,
0,
Math.PI*2
);

ctx.fillStyle=n.color;

ctx.shadowBlur=20;
ctx.shadowColor=n.color;

ctx.fill();

ctx.shadowBlur=0;

ctx.lineWidth=3;
ctx.strokeStyle="#000";
ctx.stroke();

}

}

function drawPath(points,color){

if(points.length<2) return;

ctx.beginPath();

ctx.moveTo(
points[0].x,
points[0].y
);

for(let i=1;i<points.length;i++){

ctx.lineTo(
points[i].x,
points[i].y
);

}

ctx.lineWidth=10;
ctx.lineCap="round";
ctx.lineJoin="round";
ctx.strokeStyle=color;

ctx.stroke();

}

function draw(){

ctx.clearRect(0,0,W,H);

drawBoard();

for(let p of paths){

drawPath(
p.points,
p.color
);

}

if(currentPath.length){

drawPath(
currentPath,
activeColor
);

}

drawNodes();

}

function getNode(pos){

for(let n of nodes){

if(distance(pos,n)<25){

return n;

}

}

return null;

}

function insideBoard(pos){

return distance(pos,{
x:board.x,
y:board.y
}) <= board.radius;

}

function startLine(pos){

const node = getNode(pos);

if(!node) return;

drawing = true;

activeColor = node.color;

currentPath = [{
x:node.x,
y:node.y
}];

paths = paths.filter(
p=>p.color!==activeColor
);

draw();

}

function moveLine(pos){

if(!drawing) return;

if(!insideBoard(pos)) return;

const last =
currentPath[currentPath.length-1];

if(distance(last,pos)<5) return;

currentPath.push({
x:pos.x,
y:pos.y
});

draw();

}

function checkWin(){

const totalColors =
new Set(
nodes.map(n=>n.color)
).size;

return paths.length === totalColors;

}

function nextLevel(){

message.style.display="block";
message.innerHTML="COMPLETADO";

setTimeout(()=>{

message.style.display="none";

level++;

levelText.innerHTML=
"Nivel "+level;

generateLevel();

},1500);

}

function endLine(pos){

if(!drawing) return;

drawing=false;

const node = getNode(pos);

if(
node &&
node.color===activeColor
){

currentPath.push({
x:node.x,
y:node.y
});

paths.push({
color:activeColor,
points:[...currentPath]
});

moves++;

movesText.innerHTML=
"Movimientos "+moves;

if(checkWin()){

nextLevel();

}

}

currentPath=[];

draw();

}

function touchPos(e){

const rect =
canvas.getBoundingClientRect();

const t =
e.touches[0] ||
e.changedTouches[0];

return{
x:t.clientX-rect.left,
y:t.clientY-rect.top
};

}

/* TOUCH IOS */

canvas.addEventListener(
"touchstart",
function(e){

e.preventDefault();

startLine(
touchPos(e)
);

},
{passive:false}
);

canvas.addEventListener(
"touchmove",
function(e){

e.preventDefault();

moveLine(
touchPos(e)
);

},
{passive:false}
);

canvas.addEventListener(
"touchend",
function(e){

e.preventDefault();

endLine(
touchPos(e)
);

},
{passive:false}
);

/* BUTTON */

document.getElementById(
"restartBtn"
).onclick=function(){

moves=0;

movesText.innerHTML=
"Movimientos 0";

generateLevel();

};

resize();

generateLevel();

</script>

</body>
</html>
